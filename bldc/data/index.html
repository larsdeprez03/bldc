<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ESP32 3D Orientation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #canvas-container { width: 100%; height: 300px; background: #111; border-radius: 15px; margin: 15px 0; overflow: hidden; border: 1px solid #444; }
        .slider { width: 100%; height: 15px; border-radius: 10px; background: #444; outline: none; margin: 10px 0; -webkit-appearance: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 25px; height: 25px; border-radius: 50%; background: #00adb5; cursor: pointer; border: 3px solid #fff; }
        .val-display { font-size: 1.5rem; color: #00adb5; font-weight: bold; font-family: monospace; }
        .btn-zero { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .master-section { border: 2px solid #00adb5; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>3D ESC Monitor</h1>
        
        <div id="canvas-container"></div>
        
        <div style="margin-bottom: 20px;">
            <p>Pitch: <span id="pitch" style="color:#ff9f43">0°</span> | Roll: <span id="roll" style="color:#ff9f43">0°</span></p>
            <button class="btn-zero" onclick="fetch('/setZero')">SET ZERO POINT</button>
        </div>

        <div class="master-section">
            <h3>MASTER THROTTLE</h3>
            <div id="valM" class="val-display">1000</div>
            <input type="range" min="1000" max="2000" value="1000" class="slider" id="sliderM">
        </div>

        <div style="display: flex; justify-content: space-around;">
            <div><h4>M1</h4><div id="val1" class="val-display">1000</div></div>
            <div><h4>M2</h4><div id="val2" class="val-display">1000</div></div>
        </div>
    </div>

    <script>
        // --- 3D SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // Create a Box (representing your hardware)
        const geometry = new THREE.BoxGeometry(3, 0.5, 2);
        const material = [
            new THREE.MeshBasicMaterial({color: 0x00adb5}), // right
            new THREE.MeshBasicMaterial({color: 0x00adb5}), // left
            new THREE.MeshBasicMaterial({color: 0xffffff}), // top (white for orientation)
            new THREE.MeshBasicMaterial({color: 0x444444}), // bottom
            new THREE.MeshBasicMaterial({color: 0xff9f43}), // front
            new THREE.MeshBasicMaterial({color: 0x00adb5})  // back
        ];
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // --- DATA POLLING ---
        setInterval(() => {
            fetch('/getAngles').then(r => r.json()).then(data => {
                document.getElementById('pitch').innerText = data.pitch.toFixed(1) + "°";
                document.getElementById('roll').innerText = data.roll.toFixed(1) + "°";

                // Convert degrees to Radians for Three.js
                // Pitch is rotation around X axis, Roll is rotation around Z axis
                cube.rotation.x = data.pitch * (Math.PI / 180);
                cube.rotation.z = -data.roll * (Math.PI / 180); 
            });
        }, 50); // 20 times per second for smooth motion

        // --- SLIDER LOGIC ---
        const sM = document.getElementById("sliderM");
        sM.oninput = function() {
            let v = this.value;
            document.getElementById("valM").innerHTML = v;
            document.getElementById("val1").innerHTML = v;
            document.getElementById("val2").innerHTML = v;
            fetch(`/setThrottle?motor=1&val=${v}`);
            fetch(`/setThrottle?motor=2&val=${v}`);
        }
    </script>
</body>
</html>
